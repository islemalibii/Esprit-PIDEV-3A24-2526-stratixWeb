security:
    password_hashers:
        App\Entity\Utilisateur:
            algorithm: bcrypt

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Utilisateur
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            custom_authenticator: App\Security\LoginAuthenticator
            logout:
                path: app_logout
                target: app_login

    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/logout, roles: PUBLIC_ACCESS }
        - { path: ^/signup, roles: PUBLIC_ACCESS }
        - { path: ^/connect, roles: PUBLIC_ACCESS }
        - { path: ^/forgot-password, roles: PUBLIC_ACCESS }
        - { path: ^/check-email, roles: PUBLIC_ACCESS }
        - { path: ^/reset-password, roles: PUBLIC_ACCESS }
        - { path: ^/emotion-check, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/emotion-redirect, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/admin/users, roles: ROLE_ADMIN }
        - { path: ^/admin, roles: [ROLE_ADMIN, ROLE_RESPONSABLE_RH, ROLE_RESPONSABLE_PROJET, ROLE_RESPONSABLE_PRODUCTION, ROLE_CEO] }
        - { path: ^/employee, roles: ROLE_EMPLOYE }
        - { path: ^/, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            App\Entity\Utilisateur:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
